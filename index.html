<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VidFlow Ultimate Hybrid</title>
    <!-- Hanya butuh Tailwind untuk styling cepat -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { 
            --accent: #2563eb; 
            --bg: #020617;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: white; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Desain Kartu v5 Favorit Anda */
        .ultimate-card {
            background: linear-gradient(#0f172a, #0f172a) padding-box,
                        linear-gradient(135deg, #2563eb, #7c3aed, #db2777) border-box;
            border: 2px solid transparent;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .progress-glow {
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input::placeholder { color: #475569; }

        .btn-active:active { transform: scale(0.96); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-flow { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body class="p-0 m-0">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-slate-900 p-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-600/20">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4m4-10l5 5 5-5m-5 5V3"/></svg>
            </div>
            <h1 class="text-xl font-black italic tracking-tighter">VIDFLOW <span class="text-blue-500 underline decoration-blue-500/30">HYBRID</span></h1>
        </div>
        <div class="text-[9px] font-bold bg-slate-900 border border-slate-800 px-3 py-1 rounded-full text-slate-500 tracking-widest">ULTIMATE v9</div>
    </nav>

    <main class="max-w-lg mx-auto px-6 py-10">
        <!-- Header -->
        <div class="text-center mb-10 animate-flow">
            <h2 class="text-4xl font-black mb-2 italic">Instant Download</h2>
            <p class="text-slate-500 text-xs font-bold tracking-[0.3em] uppercase">No Loading • No Waiting • High Speed</p>
        </div>

        <!-- Card Input (v5 Style) -->
        <div class="ultimate-card p-8 mb-10 animate-flow" style="animation-delay: 0.1s;">
            <div class="space-y-6">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center text-blue-500">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    </div>
                    <input 
                        type="url" 
                        id="videoUrl"
                        placeholder="Tempel link video di sini..."
                        class="w-full pl-14 pr-6 py-5 rounded-2xl bg-slate-800/30 border border-slate-700/50 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all text-base font-semibold"
                    >
                </div>

                <div class="flex gap-3">
                    <select id="format" class="bg-slate-800 border border-slate-700 rounded-xl px-4 text-xs font-bold uppercase tracking-widest outline-none focus:border-blue-500 transition-all">
                        <option value="mp4">MP4</option>
                        <option value="mp3">MP3</option>
                    </select>
                    <button 
                        id="dlBtn"
                        onclick="startDownload()"
                        class="flex-1 py-5 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-black text-sm tracking-[0.2em] shadow-xl shadow-blue-900/20 btn-active transition-all"
                    >
                        DOWNLOAD SEKARANG
                    </button>
                </div>

                <!-- Progress Section (Hidden by Default) -->
                <div id="progressArea" class="hidden space-y-3 pt-4 border-t border-slate-800">
                    <div class="flex justify-between items-end">
                        <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest animate-pulse">Menghubungkan ke Server...</p>
                        <p id="progressPercent" class="text-xl font-black text-blue-500">0%</p>
                    </div>
                    <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-gradient-to-r from-blue-600 to-indigo-500 progress-glow w-0"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Riwayat -->
        <div class="space-y-6 animate-flow" style="animation-delay: 0.2s;">
            <div class="flex justify-between items-center px-2">
                <h3 class="font-black text-sm flex items-center gap-2 tracking-widest uppercase">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5"/></svg>
                    Riwayat Terakhir
                </h3>
                <button onclick="clearHistory()" class="text-[10px] font-black text-red-500/50 hover:text-red-500 uppercase tracking-widest">Bersihkan</button>
            </div>

            <div id="historyList" class="space-y-3">
                <!-- Data riwayat akan muncul di sini -->
            </div>
        </div>
    </main>

    <footer class="py-10 text-center opacity-20">
        <p class="text-[9px] font-black tracking-[0.5em] uppercase">VidFlow Hybrid Engine • Stable Core</p>
    </footer>

    <script>
        // Inisialisasi Data
        let history = JSON.parse(localStorage.getItem('vidflow_hybrid_db')) || [];
        const historyList = document.getElementById('historyList');
        const dlBtn = document.getElementById('dlBtn');
        const progressArea = document.getElementById('progressArea');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = `<div class="py-12 text-center border-2 border-dashed border-slate-900 rounded-[2.5rem] opacity-20 font-bold italic text-sm">Belum ada aktivitas.</div>`;
                return;
            }
            historyList.innerHTML = history.map(item => `
                <div class="p-5 bg-slate-900/40 border border-slate-800 rounded-2xl flex justify-between items-center animate-flow">
                    <div class="flex items-center gap-4">
                        <div class="bg-blue-600/10 text-blue-500 p-3 rounded-xl">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/><path d="m22 8-6 4 6 4V8Z"/></svg>
                        </div>
                        <div>
                            <p class="text-xs font-extrabold truncate max-w-[150px]">${item.title}</p>
                            <p class="text-[9px] font-bold opacity-30 uppercase mt-1">${item.time} • ${item.size}</p>
                        </div>
                    </div>
                    <button onclick="deleteItem(${item.id})" class="p-2 text-slate-700 hover:text-red-500 transition-colors">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                </div>
            `).join('');
        }

        async function startDownload() {
            const url = document.getElementById('videoUrl').value;
            const format = document.getElementById('format').value;
            
            if (!url) return;

            // UI State
            dlBtn.disabled = true;
            dlBtn.innerText = "MENGHUBUNGKAN...";
            progressArea.classList.remove('hidden');
            
            // Progress Simulation
            let p = 0;
            const interval = setInterval(() => {
                p += Math.floor(Math.random() * 12) + 2;
                if (p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    completeDownload(url, format);
                }
                progressBar.style.width = p + '%';
                progressPercent.innerText = p + '%';
            }, 250);
        }

        function completeDownload(url, format) {
            // Trigger Download Nyata
            // Link W3Schools paling stabil untuk testing download di browser
            const realFile = "https://www.w3schools.com/html/mov_bbb.mp4";
            const fileName = `VidFlow_Hybrid_${Date.now()}.${format}`;

            const a = document.createElement('a');
            a.href = realFile;
            a.download = fileName;
            a.target = "_blank";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // Simpan ke Riwayat
            const entry = {
                id: Date.now(),
                title: fileName,
                time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
                size: "2.5 MB"
            };
            history = [entry, ...history];
            localStorage.setItem('vidflow_hybrid_db', JSON.stringify(history));

            // Reset UI
            setTimeout(() => {
                dlBtn.disabled = false;
                dlBtn.innerText = "DOWNLOAD SEKARANG";
                progressArea.classList.add('hidden');
                progressBar.style.width = '0%';
                document.getElementById('videoUrl').value = '';
                renderHistory();
            }, 1000);
        }

        function deleteItem(id) {
            history = history.filter(i => i.id !== id);
            localStorage.setItem('vidflow_hybrid_db', JSON.stringify(history));
            renderHistory();
        }

        function clearHistory() {
            if(confirm("Hapus semua riwayat?")) {
                history = [];
                localStorage.setItem('vidflow_hybrid_db', JSON.stringify(history));
                renderHistory();
            }
        }

        // Jalankan saat startup
        renderHistory();
    </script>
</body>
</html>
